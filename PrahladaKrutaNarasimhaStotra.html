<!DOCTYPE html>
<html lang="sa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Narasimha Stotram</title>
<style>
  :root {
    --bg-main: #f4f6f9; --card-bg: #fff; --card-border: #e0e6ed;
    --card-active: #ffebee; --text-primary: #1a1a1a; --text-sanskrit: #b71c1c;
    --accent-red: #d32f2f; --accent-gold: #ffa000;
  }
  body { margin: 0; padding-bottom: 90px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-main); color: var(--text-primary); }
  .app-container { max-width: 600px; margin: 0 auto; padding: 12px; }

  /* Utility Flex Classes */
  .flex-row { display: flex; align-items: center; }
  .flex-between { display: flex; align-items: center; justify-content: space-between; }
  .flex-center { display: flex; align-items: center; justify-content: center; }

  /* Header & Search */
  .header { text-align: center; padding: 10px 0 5px; }
  .header h1 { margin: 0; font-size: 20px; color: var(--accent-red); font-weight: 800; }
  .header .author { font-size: 10px; color: #555; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 10px; }
  .search-container { position: relative; margin-bottom: 12px; }
  .search-input { width: 100%; padding: 10px 36px 10px 14px; border: 1px solid var(--card-border); border-radius: 20px; font-size: 14px; box-sizing: border-box; outline: none; }
  .search-input:focus { border-color: var(--accent-red); }
  .clear-search-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 16px; color: #999; cursor: pointer; display: none; }

  /* Mini-Mode */
  .expand-btn { display: none; background: var(--accent-red); color: #fff; border: none; padding: 8px 16px; border-radius: 20px; margin: 0 auto 15px; font-size: 13px; font-weight: bold; cursor: pointer; }
  body.mini-mode .expand-btn { display: block; }
  body.mini-mode .header, body.mini-mode .shloka-list, body.mini-mode .search-container { display: none; }
  body.mini-mode { background: #121212; display: flex; flex-direction: column; justify-content: center; height: 100vh; padding-bottom: 0; }
  body.mini-mode .reading-card { background: #1e1e1e; border: 1px solid #333; color: #fff; margin: 0 15px; border-radius: 16px; }
  body.mini-mode .bottom-player { position: relative; background: transparent; border: none; box-shadow: none; margin-top: 20px; }
  body.mini-mode .btn-sm, body.mini-mode .track-label, body.mini-mode .time-display { color: #aaa; background: #333; border: none; }

  /* Reading & List Cards */
  .reading-card { background: var(--card-bg); border: 2px solid #ffcdd2; border-radius: 12px; padding: 20px 16px; text-align: center; font-size: 20px; color: var(--text-sanskrit); line-height: 1.5; font-weight: 600; margin-bottom: 12px; min-height: 60px; display: flex; align-items: center; justify-content: center; }
  .shloka-list { display: flex; flex-direction: column; gap: 8px; }
  .shloka-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 8px; padding: 10px 12px; display: flex; align-items: center; gap: 10px; transition: background 0.2s; }
  .shloka-card.active { background: var(--card-active); border-color: var(--accent-red); border-left: 4px solid var(--accent-red); }
  .shloka-num { font-size: 12px; font-weight: bold; color: #666; min-width: 20px; }
  .shloka-text { flex-grow: 1; font-size: 15px; color: var(--text-sanskrit); line-height: 1.4; font-weight: 500; cursor: pointer; }
  .btn-icon { background: none; border: none; font-size: 16px; cursor: pointer; color: #b0bec5; padding: 4px; }
  .is-fav { color: var(--accent-gold) !important; }
  .is-practice { color: var(--accent-red) !important; }
  .has-note { color: #1976d2 !important; }

  /* Bottom Toolbar Grid - 4 Equally Spaced Sections */
  .bottom-player { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #e0e0e0; box-shadow: 0 -4px 20px rgba(0,0,0,0.1); z-index: 100; }
  
  .player-inner { 
    max-width: 600px; margin: 0 auto; display: flex; align-items: center; justify-content: space-evenly; padding: 8px 4px; 
  }
  
  .timer-group { display: flex; flex-direction: column; text-align: center; min-width: 75px; }
  .popup-container { position: relative; display: flex; align-items: center; justify-content: center; }

  .btn-play { background: var(--accent-red); color: #fff; border: none; width: 38px; height: 38px; border-radius: 50%; font-size: 16px; cursor: pointer; box-shadow: 0 2px 6px rgba(211, 47, 47, 0.4); flex-shrink: 0; margin: 0 6px; }
  .btn-nav { background: none; border: none; font-size: 16px; color: #333; cursor: pointer; padding: 2px; }
  .btn-sm { background: #f0f4f8; border: 1px solid #bccbde; border-radius: 14px; padding: 5px 10px; font-size: 11px; font-weight: bold; color: #222; cursor: pointer; white-space: nowrap; }

  .track-label { font-size: 11px; font-weight: 800; color: #333; }
  .time-display { font-size: 9px; font-weight: 600; color: #666; font-variant-numeric: tabular-nums; }
  .repeat-counter { font-size: 9px; font-weight: bold; color: var(--accent-red); }

  /* Popups */
  .popup { position: absolute; bottom: 50px; right: 0; background: #fff; border: 1px solid #ccc; border-radius: 10px; padding: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); display: none; flex-direction: column; gap: 10px; z-index: 105; width: 220px; box-sizing: border-box; }
  .popup.show { display: flex; }
  .popup hr { width: 100%; border: 0; border-top: 1px solid #eee; margin: 0; }
  
  /* Popup Layouts */
  .pop-row { display: flex; align-items: center; justify-content: space-between; font-size: 12px; font-weight: bold; width: 100%; }
  .pop-input { width: 45px; text-align: center; border: 1px solid #ccc; border-radius: 4px; padding: 3px; font-size: 11px; }
  .pop-range { width: 75px; cursor: pointer; }
  .pop-item { padding: 6px 10px; font-size: 12px; font-weight: 600; cursor: pointer; border-radius: 6px; display: flex; align-items: center; gap: 6px; }
  .pop-item:hover { background: #f0f4f8; }
  .pop-item.active { background: #ffebee; color: var(--accent-red); }

  /* Menus & Modals */
  .context-menu { position: absolute; background: #fff; border: 1px solid #ccc; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.2); display: none; flex-direction: column; z-index: 200; }
  .context-menu.show { display: flex; }
  .context-menu div { padding: 8px 14px; cursor: pointer; font-size: 13px; font-weight: 600; display: flex; gap: 8px; }
  
  .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 300; }
  .modal-content { background: #fff; padding: 16px; border-radius: 10px; width: 80%; max-width: 300px; }
  .modal-content textarea { width: 100%; height: 70px; margin: 8px 0; padding: 8px; border-radius: 6px; border: 1px solid #ccc; font-family: inherit; box-sizing: border-box; }
</style>
</head>
<body>

<div class="app-container">
  <button class="expand-btn" onclick="exitMiniMode()">↙ Full Library</button>
  <div class="header">
    <h1>॥ प्रह्लादकृत नृसिंह स्तोत्र ॥</h1>
    <div class="author">By Tribhuvan Achar</div>
  </div>

  <div class="search-container">
    <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search shloka number or text..." oninput="handleSearch()">
    <button class="clear-search-btn" id="clearSearchBtn" onclick="clearSearch()">✖</button>
  </div>

  <div class="reading-card" id="readingCard">श्लोकं चिनोतु (Select a shloka)</div>
  <div class="shloka-list" id="shlokaList"></div>
</div>

<!-- Bottom Toolbar -->
<div class="bottom-player">
  <div class="player-inner">
    
    <!-- 1. Playback Controls -->
    <div class="flex-row">
      <button class="btn-nav" onclick="playPrevFiltered()">⏮</button>
      <button class="btn-play flex-center" id="playBtn" onclick="togglePlay()">▶</button>
      <button class="btn-nav" onclick="playNextFiltered()">⏭</button>
    </div>

    <!-- 2. Timer Group -->
    <div class="timer-group">
      <div class="track-label" id="trackLabel">०/४३</div>
      <div class="time-display" id="timeDisplay">0:00.000 / 0:00.000</div>
      <div class="repeat-counter" id="repeatCounter"></div>
    </div>

    <!-- 3. Filter Section -->
    <div class="popup-container">
      <button class="btn-sm" onclick="togglePopup('filterPopup')" id="filterBtn">Filter: All</button>
      
      <!-- Filter Popup -->
      <div class="popup" id="filterPopup" style="right: -40px;">
        <div class="pop-item active" id="opt-all" onclick="setFilter('all')">▶ All</div>
        <div class="pop-item" id="opt-fav" onclick="setFilter('fav')">▶ ★ Favorites</div>
        <div class="pop-item" id="opt-practice" onclick="setFilter('practice')">▶ 🚩 Practice</div>
        <div class="pop-item" id="opt-none" onclick="setFilter('none')">⏸ Single Track</div>
        <hr>
        <!-- Compact Range Box -->
        <div style="font-size: 11px; font-weight: bold;">
          <div class="flex-between" style="margin-bottom:6px;">
            <span>📐 Range:</span>
            <select id="rangeMode" style="font-size:10px; padding:2px;" onchange="applyRangeFilter()">
              <option value="include">Include</option>
              <option value="exclude">Exclude</option>
            </select>
          </div>
          <div class="flex-between">
            <input class="pop-input" type="number" id="rangeStart" placeholder="From" min="1" max="43" onchange="applyRangeFilter()">
            <span>to</span>
            <input class="pop-input" type="number" id="rangeEnd" placeholder="To" min="1" max="43" onchange="applyRangeFilter()">
            <button class="btn-sm" style="padding: 4px 6px;" onclick="clearRange()">Clear</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 4. Tools Section -->
    <div class="popup-container">
      <button class="btn-sm" onclick="togglePopup('toolsPopup')" title="Tools">⚙️ Tools</button>

      <!-- Tools Popup -->
      <div class="popup" id="toolsPopup" style="right: 0;">
        <div class="pop-row">
          <span>⚡ <span id="speedVal">1.0</span>x</span>
          <input type="range" class="pop-range" id="speedInput" min="0.5" max="2.0" step="0.1" value="1.0">
        </div>
        <div class="pop-row">
          <span>🔁 Rep:</span>
          <input type="number" class="pop-input" id="repeatInput" value="1" min="1" onchange="updateRepeatDisplay()">
        </div>
        <hr>
        <!-- Perfectly Aligned A-B Loop Stack -->
        <div style="font-size: 12px; font-weight: bold;">
          <label class="flex-row" style="gap:4px; cursor:pointer; margin-bottom:6px;">
            <input type="checkbox" id="enableAB" style="margin:0;"> ✂️ A-B Loop
          </label>
          <div class="flex-between">
            <span>Start <input class="pop-input" type="number" id="loopA" placeholder="0.0" step="0.1"></span>
            <span>End <input class="pop-input" type="number" id="loopB" placeholder="End" step="0.1"></span>
          </div>
        </div>
        <hr>
        <button class="btn-sm flex-center" id="cacheBtn" style="background:#ffebee; color:var(--accent-red); border-color:#ffcdd2;" onclick="cacheAllAudio(this)">📥 Preload All Audio</button>
      </div>
    </div>

  </div>
</div>

<!-- Menus & Modals -->
<div class="context-menu" id="markerMenu">
  <div onclick="setMark('fav')">⭐ Mark Favorite</div>
  <div onclick="setMark('practice')">🚩 Needs Practice</div>
  <div onclick="shareShloka()">🔗 Share / Mini-Link</div>
  <div onclick="downloadShloka(this)">⬇️ Download MP3</div>
  <div onclick="setMark('none')" style="color: #888;">❌ Clear Marker</div>
</div>

<div class="modal-overlay" id="noteModal">
  <div class="modal-content">
    <h4 style="margin:0 0 6px 0;">Notes (Shloka <span id="noteShlokaNum"></span>)</h4>
    <textarea id="noteText"></textarea>
    <div style="text-align:right;">
      <button class="btn-sm" onclick="closeNote()">Cancel</button>
      <button class="btn-sm" style="background:var(--accent-red); color:#fff; border:none; margin-left:6px;" onclick="saveNote()">Save</button>
    </div>
  </div>
</div>

<script>
  const archiveBaseUrl = "https://archive.org/download/svg_3bu1_pns/";
  const filePrefix = "NS"; 
  const fileExtension = ".mp3";
  const totalShlokas = 43; 
  const shlokaTexts = { 1: "ब्रह्मोवाच ।<br>त्वं नस्तपः परममात्थ यदात्मतन्त्रो...", 2: "श्रीशुक उवाच ।<br>इत्युक्त्वा तं तदा ब्रह्मा..." };

  let currentAudio = new Audio();
  let activeId = null;
  let isPlaying = false;
  let currentLoopCount = 0;
  let currentFilter = 'all';

  let marks = JSON.parse(localStorage.getItem('narasimhaMarks')) || {};
  let notes = JSON.parse(localStorage.getItem('narasimhaNotes')) || {};

  const els = {
    playBtn: document.getElementById('playBtn'), speedInput: document.getElementById('speedInput'),
    speedVal: document.getElementById('speedVal'), trackLabel: document.getElementById('trackLabel'),
    timeDisplay: document.getElementById('timeDisplay'), repeatCounter: document.getElementById('repeatCounter'),
    readingCard: document.getElementById('readingCard'), toolsPopup: document.getElementById('toolsPopup'),
    filterPopup: document.getElementById('filterPopup'), markerMenu: document.getElementById('markerMenu'),
    filterBtn: document.getElementById('filterBtn'), searchInput: document.getElementById('searchInput'),
    clearSearchBtn: document.getElementById('clearSearchBtn'), repeatInput: document.getElementById('repeatInput'),
    cacheBtn: document.getElementById('cacheBtn'), listEl: document.getElementById('shlokaList')
  };

  function formatTime(s) {
    if (isNaN(s)) return "0:00.000";
    const m = Math.floor(s/60), sec = Math.floor(s%60), ms = Math.floor((s%1)*1000);
    return m + ":" + (sec<10?"0":"") + sec + "." + String(ms).padStart(3,'0');
  }

  function updateRepeatDisplay() {
    const t = parseInt(els.repeatInput.value) || 1;
    els.repeatCounter.innerText = (activeId && t > 1) ? `Loop ${currentLoopCount + 1}/${t}` : "";
  }

  function checkMiniMode() {
    const miniId = new URLSearchParams(window.location.search).get('mini');
    if (miniId && miniId >= 1 && miniId <= totalShlokas) {
      document.body.classList.add('mini-mode');
      setTimeout(() => playShloka(parseInt(miniId)), 400);
    }
  }

  function exitMiniMode() {
    document.body.classList.remove('mini-mode');
    window.history.pushState({}, document.title, window.location.pathname);
  }

  function getFilteredIds() {
    let ids = [];
    const rs = parseInt(document.getElementById('rangeStart').value), re = parseInt(document.getElementById('rangeEnd').value);
    const rm = document.getElementById('rangeMode').value, hasRange = !isNaN(rs) && !isNaN(re) && rs <= re;
    for (let i = 1; i <= totalShlokas; i++) {
      if (currentFilter === 'fav' && marks[i] !== 'fav') continue;
      if (currentFilter === 'practice' && marks[i] !== 'practice') continue;
      if (hasRange) { const inR = (i >= rs && i <= re); if ((rm === 'include' && !inR) || (rm === 'exclude' && inR)) continue; }
      ids.push(i);
    }
    return ids;
  }

  function clearRange() { document.getElementById('rangeStart').value = ""; document.getElementById('rangeEnd').value = ""; applyRangeFilter(); }

  function setFilter(type) {
    currentFilter = type;
    els.filterPopup.classList.remove('show');
    document.querySelectorAll('.pop-item').forEach(el => el.classList.remove('active'));
    
    const labels = { 'all': 'Filter: All', 'fav': 'Filter: ★', 'practice': 'Filter: 🚩', 'none': 'Filter: One' };
    els.filterBtn.innerText = labels[type];
    document.getElementById(`opt-${type}`).classList.add('active');

    renderList();
    if (type !== 'none') {
      const aIds = getFilteredIds();
      if (aIds.length) playShloka(aIds[0]);
      else { currentAudio.pause(); activeId = null; isPlaying = false; updatePlayUI(); els.trackLabel.innerText = "०/"+totalShlokas; els.timeDisplay.innerText = "0:00.000 / 0:00.000"; els.repeatCounter.innerText = ""; els.readingCard.innerHTML = "No matches."; }
    }
  }

  function applyRangeFilter() {
    renderList();
    const aIds = getFilteredIds();
    if (aIds.length && currentFilter !== 'none') playShloka(aIds[0]);
  }

  function handleSearch() {
    const q = els.searchInput.value.toLowerCase().trim();
    els.clearSearchBtn.style.display = q ? 'block' : 'none';
    document.querySelectorAll('.shloka-card').forEach(c => {
      const t = c.querySelector('.shloka-text').innerText.toLowerCase();
      c.style.display = (c.id.replace('shloka-','').includes(q) || t.includes(q)) ? 'flex' : 'none';
    });
  }

  function clearSearch() { els.searchInput.value = ''; els.clearSearchBtn.style.display = 'none'; renderList(); }

  function renderList() {
    els.listEl.innerHTML = '';
    const fIds = getFilteredIds();
    for (let i = 1; i <= totalShlokas; i++) {
      if (!fIds.includes(i)) continue;
      const c = document.createElement('div');
      c.className = `shloka-card ${activeId===i && !document.body.classList.contains('mini-mode') ? 'active':''}`;
      c.id = `shloka-${i}`;
      let mClass = "btn-icon", mIcon = "⋮";
      if (marks[i] === 'fav') { mClass += " is-fav"; mIcon = "★"; }
      else if (marks[i] === 'practice') { mClass += " is-practice"; mIcon = "🚩"; }
      const nClass = notes[i] ? "btn-icon has-note" : "btn-icon";

      c.innerHTML = `<div class="shloka-num">${i}</div>
        <div class="shloka-text" onclick="playShloka(${i})">${shlokaTexts[i] || 'श्लोक '+i}</div>
        <div class="card-actions"><button class="${nClass}" onclick="openNote(${i})">📝</button><button class="${mClass}" onclick="openMarkerMenu(event, ${i})">${mIcon}</button></div>`;
      els.listEl.appendChild(c);
    }
  }

  function updatePlayUI() { els.playBtn.innerHTML = isPlaying ? '⏸' : '▶'; }

  currentAudio.addEventListener('playing', () => { isPlaying = true; updatePlayUI(); });
  currentAudio.addEventListener('pause', () => { isPlaying = false; updatePlayUI(); });
  currentAudio.addEventListener('loadedmetadata', () => {
    currentAudio.playbackRate = parseFloat(els.speedInput.value) || 1.0;
    document.getElementById('loopB').value = currentAudio.duration.toFixed(1);
    els.timeDisplay.innerText = `0:00.000 / ${formatTime(currentAudio.duration)}`;
    updateRepeatDisplay();
  });
  currentAudio.addEventListener('error', () => {
    if (activeId) {
      currentAudio.src = `${archiveBaseUrl}${filePrefix}${activeId}%E2%80%8B${fileExtension}`;
      currentAudio.load(); currentAudio.play().then(() => { isPlaying=true; updatePlayUI(); }).catch(()=>{});
    }
  });

  function playShloka(id) {
    if (activeId === id && isPlaying) { currentAudio.pause(); return; }
    activeId = id; currentLoopCount = 0; updateRepeatDisplay(); renderList();
    
    const ac = document.getElementById(`shloka-${id}`);
    if (ac && !document.body.classList.contains('mini-mode')) ac.scrollIntoView({ behavior: 'smooth', block: 'center' });

    els.trackLabel.innerText = `${id}/${totalShlokas}`;
    els.readingCard.innerHTML = shlokaTexts[id] || `श्लोक ${id}`;
    els.timeDisplay.innerText = "0:00.000 / 0:00.000";

    currentAudio.src = `${archiveBaseUrl}${filePrefix}${id}${fileExtension}`;
    currentAudio.playbackRate = parseFloat(els.speedInput.value) || 1.0;
    document.getElementById('loopA').value = "0.0"; document.getElementById('loopB').value = "";
    
    currentAudio.play().catch(err => { if(err.name !== 'AbortError') console.error(err); });
  }

  function togglePlay() {
    if (!activeId) { const aIds = getFilteredIds(); if(aIds.length) playShloka(aIds[0]); }
    else if (isPlaying) currentAudio.pause();
    else currentAudio.play();
  }

  function playNextFiltered() {
    const ids = getFilteredIds(); if (!ids.length) return;
    const idx = ids.indexOf(activeId);
    if (idx !== -1 && idx < ids.length - 1) playShloka(ids[idx + 1]);
    else { currentAudio.pause(); els.repeatCounter.innerText = ""; }
  }

  function playPrevFiltered() {
    const ids = getFilteredIds(); if (!ids.length) return;
    const idx = ids.indexOf(activeId);
    if (idx > 0) playShloka(ids[idx - 1]); else playShloka(ids[ids.length - 1]);
  }

  currentAudio.addEventListener('timeupdate', () => {
    els.timeDisplay.innerText = `${formatTime(currentAudio.currentTime)} / ${formatTime(currentAudio.duration)}`;
    if (document.getElementById('enableAB').checked) {
      const end = parseFloat(document.getElementById('loopB').value), start = parseFloat(document.getElementById('loopA').value) || 0;
      if (end && currentAudio.currentTime >= end) currentAudio.currentTime = start;
    }
  });

  currentAudio.addEventListener('ended', () => {
    const tRep = parseInt(els.repeatInput.value) || 1;
    if (++currentLoopCount < tRep) {
      currentAudio.currentTime = parseFloat(document.getElementById('loopA').value) || 0;
      updateRepeatDisplay(); currentAudio.play();
    } else {
      currentLoopCount = 0; updateRepeatDisplay();
      if (currentFilter === 'none' || document.body.classList.contains('mini-mode')) { isPlaying=false; updatePlayUI(); return; }
      playNextFiltered();
    }
  });

  function togglePopup(id) { document.querySelectorAll('.popup').forEach(p => { if(p.id !== id) p.classList.remove('show'); }); document.getElementById(id).classList.toggle('show'); }

  let targetMenuId = null;
  function openMarkerMenu(e, id) { targetMenuId = id; els.markerMenu.style.left = `${e.pageX - 130}px`; els.markerMenu.style.top = `${e.pageY - 40}px`; els.markerMenu.classList.add('show'); }

  function setMark(type) {
    if (type === 'none') delete marks[targetMenuId]; else marks[targetMenuId] = type;
    localStorage.setItem('narasimhaMarks', JSON.stringify(marks));
    els.markerMenu.classList.remove('show'); renderList();
  }

  function shareShloka() {
    const u = `${window.location.origin}${window.location.pathname}?mini=${targetMenuId}`;
    if (navigator.share) navigator.share({ title: 'Narasimha Stotram', url: u });
    else { navigator.clipboard.writeText(u); alert("Link copied!"); }
    els.markerMenu.classList.remove('show');
  }

  async function downloadShloka(btn) {
    const orig = btn.innerText; btn.innerText = "⏳ Downloading...";
    try {
      let r = await fetch(`${archiveBaseUrl}${filePrefix}${targetMenuId}${fileExtension}`).catch(()=>null);
      if(!r || !r.ok) r = await fetch(`${archiveBaseUrl}${filePrefix}${targetMenuId}%E2%80%8B${fileExtension}`).catch(()=>null);
      if (r && r.ok) {
        const bl = await r.blob(), u = window.URL.createObjectURL(bl), a = document.createElement('a');
        a.href = u; a.download = `Shloka_${targetMenuId}${fileExtension}`; document.body.appendChild(a); a.click(); window.URL.revokeObjectURL(u);
        btn.innerText = "✅ Downloaded";
      } else alert("Download failed.");
    } catch(e) { alert("Download failed."); }
    setTimeout(() => { btn.innerText = orig; els.markerMenu.classList.remove('show'); }, 2000);
  }

  function checkCacheStatus() {
    if (localStorage.getItem('narasimhaAllCached') === 'true') {
      els.cacheBtn.innerText = "✅ All Cached (43/43)"; els.cacheBtn.dataset.cached = "true";
      els.cacheBtn.style.background = "#e8f5e9"; els.cacheBtn.style.color = "#2e7d32"; els.cacheBtn.style.borderColor = "#c8e6c9";
    }
  }

  async function cacheAllAudio(btn) {
    if(btn.dataset.cached === "true") return;
    const orig = btn.innerText; btn.innerText = "⏳ Preloading..."; btn.disabled = true;
    let success = 0;
    for(let i=1; i<=totalShlokas; i++) {
      try {
        let r = await fetch(`${archiveBaseUrl}${filePrefix}${i}${fileExtension}`);
        if(!r.ok) r = await fetch(`${archiveBaseUrl}${filePrefix}${i}%E2%80%8B${fileExtension}`);
        if(r.ok) { await r.blob(); success++; }
      } catch(e) {}
    }
    localStorage.setItem('narasimhaAllCached', 'true');
    btn.innerText = `✅ All Cached (${success}/${totalShlokas})`; btn.dataset.cached = "true";
    btn.style.background = "#e8f5e9"; btn.style.color = "#2e7d32"; btn.style.borderColor = "#c8e6c9";
  }

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.popup-container') && !e.target.closest('.popup')) document.querySelectorAll('.popup').forEach(p => p.classList.remove('show'));
    if (!e.target.closest('.card-actions') && !e.target.closest('.context-menu')) els.markerMenu.classList.remove('show');
  });

  els.speedInput.addEventListener('input', (e) => { els.speedVal.innerText = parseFloat(e.target.value).toFixed(1); currentAudio.playbackRate = e.target.value; });

  let targetNoteId = null;
  function openNote(id) { targetNoteId = id; document.getElementById('noteShlokaNum').innerText = id; document.getElementById('noteText').value = notes[id] || ""; document.getElementById('noteModal').style.display = "flex"; }
  function closeNote() { document.getElementById('noteModal').style.display = "none"; }
  function saveNote() { const txt = document.getElementById('noteText').value.trim(); if(txt) notes[targetNoteId] = txt; else delete notes[targetNoteId]; localStorage.setItem('narasimhaNotes', JSON.stringify(notes)); closeNote(); renderList(); }

  renderList(); checkMiniMode(); checkCacheStatus();
</script>
</body>
</html>
