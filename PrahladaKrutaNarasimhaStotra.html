<!DOCTYPE html>
<html lang="sa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Narasimha Stotra Player</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f1ebd8; 
  }
  .player-container {
    max-width: 600px;
    margin: 0 auto;
    background: #e1d2a9;
    border: 1px solid #ccc;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  }
  .header {
    text-align: center;
    padding: 15px;
    font-size: 22px;
    font-weight: bold;
    background: #d8c695;
    border-bottom: 2px solid #c4b077;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 15px;
    padding: 15px;
    background: #e8deb8;
  }
  .control-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    width: 100%;
  }
  .btn {
    background: #c4b077;
    border: 1px solid #a8945a;
    border-radius: 5px;
    font-size: 24px;
    padding: 5px 15px;
    cursor: pointer;
    color: #333;
  }
  .btn:active {
    background: #a8945a;
  }
  .status-box {
    border: 1px solid #333;
    padding: 6px 12px;
    border-radius: 4px;
    background: #fdfdfd;
    font-weight: bold;
    min-width: 60px;
    text-align: center;
  }
  .input-box {
    width: 50px;
    padding: 4px;
    border: 1px solid #999;
    border-radius: 3px;
    text-align: center;
    font-size: 14px;
  }
  .ab-panel {
    background: #dfd4b3;
    padding: 10px;
    border-radius: 5px;
    font-size: 14px;
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: center;
    width: 100%;
  }
  .list-container {
    background: #fff;
    max-height: 55vh;
    overflow-y: auto;
  }
  .list-item {
    display: flex;
    align-items: center;
    padding: 12px 15px;
    border-bottom: 1px solid #eee;
  }
  .list-item:nth-child(even) {
    background: #faf8f2;
  }
  .active-row {
    background-color: #ffeebf !important;
    border-left: 4px solid #a83232;
  }
  .index {
    width: 35px;
    font-weight: bold;
    color: #444;
  }
  .play-icon {
    font-size: 22px;
    margin-right: 15px;
    cursor: pointer;
    color: #333;
  }
  .text {
    flex-grow: 1;
    font-size: 18px;
    color: #a83232; 
    line-height: 1.4;
  }
  .favorite-icon {
    font-size: 20px;
    cursor: pointer;
    color: #ccc;
    margin-left: 10px;
  }
  .is-favorite {
    color: #ffbc00;
  }
</style>
</head>
<body>

<div class="player-container">
  <div class="header">॥ प्रह्लादकृत नृसिंह स्तोत्र ॥</div>
  
  <div class="controls">
    <div class="control-row">
      <button class="btn" id="playBtn" title="Play">▶</button>
      <button class="btn" id="stopBtn" title="Stop">■</button>
      <div class="status-box" id="counterDisplay">० / ४३</div>
    </div>
    
    <div class="control-row">
      <div>
        <label>Repeat:</label>
        <input type="number" id="repeatInput" class="input-box" value="1" min="1">
      </div>
      <div>
        <label>Speed:</label>
        <input type="number" id="speedInput" class="input-box" value="1.0" step="0.1" min="0.5" max="2.0">
      </div>
      <div>
        <input type="checkbox" id="autoplayNext"> <label for="autoplayNext">Autoplay Next</label>
      </div>
    </div>

    <!-- A-B Loop Panel -->
    <div class="ab-panel">
      <input type="checkbox" id="enableAB"> <label for="enableAB">A-B Loop</label>
      <label>Start (s):</label> <input type="number" id="loopA" class="input-box" step="0.1">
      <label>End (s):</label> <input type="number" id="loopB" class="input-box" step="0.1">
    </div>
  </div>

  <div class="list-container" id="playlist">
    <!-- List generated by JS -->
  </div>
</div>

<script>
  const archiveBaseUrl = "https://archive.org/download/svg_3bu1_pns/";
  const fileExtension = "%E2%80%8B.mp3";
  const totalShlokas = 43; 
  
  let currentAudio = new Audio();
  let activeId = null;
  let isPlaying = false;
  let currentLoopCount = 0;
  let targetRepeatCount = 1;

  const shlokaTexts = {
    1: "ब्रह्मोवाच ।<br>त्वं नस्तपः परममात्थ यदात्मतन्त्रो...",
    2: "श्रीशुक उवाच ।<br>इत्युक्त्वा तं तदा ब्रह्मा...",
  };

  function renderList() {
    const playlistEl = document.getElementById('playlist');
    playlistEl.innerHTML = '';
    let favorites = JSON.parse(localStorage.getItem('narasimhaFavs')) || [];

    for(let i = 1; i <= totalShlokas; i++) {
      const row = document.createElement('div');
      row.className = 'list-item';
      row.id = `row-${i}`;
      
      const displayText = shlokaTexts[i] ? shlokaTexts[i] : `श्लोक ${i} (Add Text in Code)`;
      const favClass = favorites.includes(i) ? 'favorite-icon is-favorite' : 'favorite-icon';

      row.innerHTML = `
        <div class="index">${i}</div>
        <div class="play-icon" onclick="playShloka(${i})">🔊</div>
        <div class="text">${displayText}</div>
        <div class="${favClass}" id="fav-${i}" onclick="toggleFavorite(${i})">★</div>
      `;
      playlistEl.appendChild(row);
    }
  }

  function playShloka(id) {
    if (activeId === id && isPlaying) {
      currentAudio.pause();
      isPlaying = false;
      return;
    }

    activeId = id;
    currentLoopCount = 0;
    targetRepeatCount = parseInt(document.getElementById('repeatInput').value) || 1;
    
    document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active-row'));
    document.getElementById(`row-${id}`).classList.add('active-row');
    document.getElementById('counterDisplay').innerText = `${id} / ${totalShlokas}`;
    
    // Ensure scroll brings active item into view
    document.getElementById(`row-${id}`).scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    
    currentAudio.src = `${archiveBaseUrl}NS${id}${fileExtension}`;
    currentAudio.playbackRate = parseFloat(document.getElementById('speedInput').value) || 1.0;
    
    currentAudio.play().catch(error => {
      console.error("Audio playback failed:", error);
    });
    isPlaying = true;
  }

  currentAudio.onerror = function() {
    alert("Error loading audio. If opening locally, your browser might be blocking it. Please test via GitHub.");
  };

  // Global Controls
  document.getElementById('playBtn').addEventListener('click', () => {
    if (activeId && !isPlaying) {
      currentAudio.play();
      isPlaying = true;
    } else if (!activeId) {
      playShloka(1); 
    }
  });

  document.getElementById('stopBtn').addEventListener('click', () => {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    isPlaying = false;
    document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active-row'));
    document.getElementById('counterDisplay').innerText = `० / ${totalShlokas}`;
    activeId = null;
  });

  document.getElementById('speedInput').addEventListener('change', (e) => {
    currentAudio.playbackRate = parseFloat(e.target.value);
  });

  // A-B Loop Logic (Fires repeatedly as audio plays)
  currentAudio.addEventListener('timeupdate', () => {
    const enableAB = document.getElementById('enableAB').checked;
    if (enableAB) {
      const loopB = parseFloat(document.getElementById('loopB').value);
      const loopA = parseFloat(document.getElementById('loopA').value) || 0;
      
      if (loopB && currentAudio.currentTime >= loopB) {
        currentAudio.currentTime = loopA;
      }
    }
  });

  // Standard Loop & Autoplay Logic (Fires when file ends naturally)
  currentAudio.addEventListener('ended', () => {
    currentLoopCount++;
    const autoplayNext = document.getElementById('autoplayNext').checked;
    
    if (currentLoopCount < targetRepeatCount) {
      currentAudio.currentTime = 0; 
      currentAudio.play();
    } else if (autoplayNext && activeId < totalShlokas) {
      playShloka(activeId + 1); // Move to next file
    } else {
      isPlaying = false;
    }
  });

  function toggleFavorite(id) {
    let favorites = JSON.parse(localStorage.getItem('narasimhaFavs')) || [];
    const favBtn = document.getElementById(`fav-${id}`);
    
    if (favorites.includes(id)) {
      favorites = favorites.filter(favId => favId !== id);
      favBtn.classList.remove('is-favorite');
    } else {
      favorites.push(id);
      favBtn.classList.add('is-favorite');
    }
    localStorage.setItem('narasimhaFavs', JSON.stringify(favorites));
  }

  renderList();
</script>
</body>
</html>
